name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

# Engine sidecar binaries are bundled INSIDE the installer (Carlo's decision,
# 2026-07-20): the user installs once and has everything, fully offline.
# Only GGUF model weights are downloaded at runtime from the Models panel.
#
# Each OS build job assembles src-tauri/sidecars/bundled/<name>/ BEFORE
# tauri-action runs; tauri.conf.json maps that directory to the bundle
# "resources/" dir, so the files land next to the installed executable.
#
# Bundled sidecars:
#   qwentts/    qwen-tts + ggml libs. Windows: prebuilt zip downloaded from
#               the stable "engine-bins" release (compiled ONCE locally from
#               unmodified ServeurpersoCom/qwentts.cpp sources — no CUDA in
#               CI). macOS: compiled in CI with Metal. Linux: CPU.
#   voxcpm2/    voxcpm2-cli + ggml libs. Same scheme; upstream
#               tc-mb/llama.cpp-omni, commit b9d15b8. Windows build uses
#               CUDA archs 86;89;90 (older GPUs fall back to the bundled
#               ggml-cpu backend).
#   llama.cpp/  llama-server[.exe] + ggml libs (official llama.cpp release
#               binaries, pinned to b9756) + cudart DLLs on Windows
#
# ffmpeg is NOT bundled (Carlo, 2026-07-20): it is downloaded per-user at
# runtime, as before the bundling change.
#
# Windows engine rebuild (when upstream changes): build locally with CUDA,
# zip the qwentts/ and voxcpm2/ staging dirs, upload to the "engine-bins"
# release. See wiki/concepts/release-procedure.md.

env:
  LLAMACPP_VERSION: b9756
  VOXCPM2_COMMIT: b9d15b8

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
          - os: macos-latest
            # ort (ONNX Runtime) ships prebuilt binaries only for
            # aarch64-apple-darwin, so the macOS build is Apple Silicon only.
            args: "--target aarch64-apple-darwin"
          - os: ubuntu-latest
            args: ""

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxml2-utils \
            file \
            wget

      # ------------------------------------------------------------------
      # Sidecar assembly — Windows (full: qwen-tts, voxcpm2-cli,
      # llama-server, ffmpeg)
      # ------------------------------------------------------------------

      - name: Download prebuilt engine sidecars (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # Engine binaries are compiled ONCE locally from unmodified upstream
          # sources and attached to the stable "engine-bins" release. CI only
          # downloads them: no CUDA toolkit, no native compilation in CI.
          # See wiki/concepts/release-procedure.md for the rebuild procedure.
          $dst = "src-tauri\sidecars\bundled"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          foreach ($n in @("qwentts", "voxcpm2")) {
            Invoke-WebRequest -Uri "https://github.com/ACarloGitHub/Audiobook-Generator/releases/download/engine-bins/$n-windows-x64.zip" -OutFile "$n.zip"
            Expand-Archive "$n.zip" -DestinationPath $dst -Force
          }
          if (-not (Test-Path "$dst\qwentts\qwen-tts.exe")) { throw "qwen-tts.exe missing" }
          if (-not (Test-Path "$dst\voxcpm2\voxcpm2-cli.exe")) { throw "voxcpm2-cli.exe missing" }
          Get-ChildItem $dst -Recurse -File | Format-Table FullName, Length

      - name: Download official llama.cpp binaries (Windows CUDA)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $ver = "${{ env.LLAMACPP_VERSION }}"
          $base = "https://github.com/ggml-org/llama.cpp/releases/download/$ver"
          Invoke-WebRequest -Uri "$base/llama-$ver-bin-win-cuda-12.4-x64.zip" -OutFile "llama-cuda.zip"
          Invoke-WebRequest -Uri "$base/cudart-llama-bin-win-cuda-12.4-x64.zip" -OutFile "cudart.zip"
          Expand-Archive llama-cuda.zip -DestinationPath llama-cuda -Force
          Expand-Archive cudart.zip -DestinationPath cudart -Force
          $dst = "src-tauri\sidecars\bundled\llama.cpp"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          $srv = Get-ChildItem -Path llama-cuda -Recurse -Filter "llama-server.exe" | Select-Object -First 1
          if (-not $srv) { throw "llama-server.exe not found in archive" }
          Copy-Item $srv.FullName $dst\
          Copy-Item llama-cuda\*.dll $dst\ -ErrorAction SilentlyContinue
          Get-ChildItem -Path llama-cuda -Recurse -Filter "*.dll" | Copy-Item -Destination $dst -ErrorAction SilentlyContinue
          Copy-Item cudart\*.dll $dst\
          Set-Content -Path "$dst\variant.txt" -Value "cuda" -NoNewline
          if (-not (Test-Path "$dst\llama-server.exe")) { throw "llama-server.exe missing from bundle staging" }
          Get-ChildItem $dst | Format-Table Name, Length

      # ------------------------------------------------------------------
      # Sidecar assembly — macOS (Apple Silicon): llama-server + ffmpeg.
      # TODO: build qwen-tts (Metal) and voxcpm2-cli (Metal) from the
      # unmodified upstream sources and stage them the same way.
      # ------------------------------------------------------------------

      - name: Checkout qwentts.cpp (unmodified upstream sources, macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/checkout@v4
        with:
          repository: ServeurpersoCom/qwentts.cpp
          submodules: recursive
          ref: master
          path: qwentts.cpp

      - name: Build qwen-tts sidecar (macOS, Metal)
        if: matrix.os == 'macos-latest'
        run: |
          cmake -S qwentts.cpp -B qwentts.cpp/build -DCMAKE_BUILD_TYPE=Release -DGGML_METAL=ON -DGGML_NATIVE=OFF
          cmake --build qwentts.cpp/build --target qwen-tts -j 4
          dst="src-tauri/sidecars/bundled/qwentts"
          mkdir -p "$dst"
          exe=$(find qwentts.cpp/build -name "qwen-tts" -type f -perm +111 | head -1)
          [ -n "$exe" ] || { echo "qwen-tts not found"; exit 1; }
          cp "$exe" "$dst/"
          find qwentts.cpp/build -name "ggml*.dylib" -exec cp {} "$dst/" ; 2>/dev/null || true
          find qwentts.cpp/build -name "libggml*.so" -exec cp {} "$dst/" ; 2>/dev/null || true
          ls -la "$dst"

      - name: Checkout llama.cpp-omni for voxcpm2-cli (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/checkout@v4
        with:
          repository: tc-mb/llama.cpp-omni
          submodules: recursive
          ref: ${{ env.VOXCPM2_COMMIT }}
          path: llama.cpp-omni

      - name: Build voxcpm2-cli sidecar (macOS, Metal)
        if: matrix.os == 'macos-latest'
        run: |
          cmake -S llama.cpp-omni -B llama.cpp-omni/build -DCMAKE_BUILD_TYPE=Release -DGGML_METAL=ON -DGGML_NATIVE=OFF
          cmake --build llama.cpp-omni/build --target voxcpm2-cli -j 4
          dst="src-tauri/sidecars/bundled/voxcpm2"
          mkdir -p "$dst"
          exe=$(find llama.cpp-omni/build -name "voxcpm2-cli" -type f -perm +111 | head -1)
          [ -n "$exe" ] || { echo "voxcpm2-cli not found"; exit 1; }
          cp "$exe" "$dst/"
          find llama.cpp-omni/build -name "ggml*.dylib" -exec cp {} "$dst/" ; 2>/dev/null || true
          find llama.cpp-omni/build -name "libggml*.so" -exec cp {} "$dst/" ; 2>/dev/null || true
          ls -la "$dst"

      - name: Download official llama.cpp binaries (macOS arm64)
        if: matrix.os == 'macos-latest'
        run: |
          ver="${{ env.LLAMACPP_VERSION }}"
          curl -sL -o llama.tar.gz "https://github.com/ggml-org/llama.cpp/releases/download/${ver}/llama-${ver}-bin-macos-arm64.tar.gz"
          mkdir -p llama && tar -xzf llama.tar.gz -C llama
          dst="src-tauri/sidecars/bundled/llama.cpp"
          mkdir -p "$dst"
          srv=$(find llama -name "llama-server" -type f | head -1)
          [ -n "$srv" ] || { echo "llama-server not found in archive"; find llama -maxdepth 3 | head -30; exit 1; }
          cp "$srv" "$dst/"
          find llama \( -name "*.dylib" -o -name "*.so" \) -exec cp {} "$dst/" \; 2>/dev/null || true
          printf "metal" > "$dst/variant.txt"
          chmod +x "$dst/llama-server"
          ls -la "$dst"
          test -x "$dst/llama-server"

      # ------------------------------------------------------------------
      # Sidecar assembly — Linux: llama-server + ffmpeg.
      # TODO: build qwen-tts (Vulkan or CUDA) and voxcpm2-cli (Vulkan or
      # CUDA) from the unmodified upstream sources and stage them the same
      # way. AppImage/deb bundling of the .so dependencies needs a local
      # install verification pass.
      # ------------------------------------------------------------------

      - name: Checkout qwentts.cpp (unmodified upstream sources, Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/checkout@v4
        with:
          repository: ServeurpersoCom/qwentts.cpp
          submodules: recursive
          ref: master
          path: qwentts.cpp

      - name: Build qwen-tts sidecar (Linux, CPU)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -S qwentts.cpp -B qwentts.cpp/build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
          cmake --build qwentts.cpp/build --target qwen-tts -j 4
          dst="src-tauri/sidecars/bundled/qwentts"
          mkdir -p "$dst"
          exe=$(find qwentts.cpp/build -name "qwen-tts" -type f | head -1)
          [ -n "$exe" ] || { echo "qwen-tts not found"; exit 1; }
          cp "$exe" "$dst/"
          chmod +x "$dst/qwen-tts" || true
          find qwentts.cpp/build -name "libggml*.so*" -exec cp {} "$dst/" ; 2>/dev/null || true
          ls -la "$dst"

      - name: Checkout llama.cpp-omni for voxcpm2-cli (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/checkout@v4
        with:
          repository: tc-mb/llama.cpp-omni
          submodules: recursive
          ref: ${{ env.VOXCPM2_COMMIT }}
          path: llama.cpp-omni

      - name: Build voxcpm2-cli sidecar (Linux, CPU)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -S llama.cpp-omni -B llama.cpp-omni/build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
          cmake --build llama.cpp-omni/build --target voxcpm2-cli -j 4
          dst="src-tauri/sidecars/bundled/voxcpm2"
          mkdir -p "$dst"
          exe=$(find llama.cpp-omni/build -name "voxcpm2-cli" -type f | head -1)
          [ -n "$exe" ] || { echo "voxcpm2-cli not found"; exit 1; }
          cp "$exe" "$dst/"
          chmod +x "$dst/voxcpm2-cli" || true
          find llama.cpp-omni/build -name "libggml*.so*" -exec cp {} "$dst/" ; 2>/dev/null || true
          ls -la "$dst"

      - name: Download official llama.cpp binaries (Linux x64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ver="${{ env.LLAMACPP_VERSION }}"
          curl -sL -o llama.tar.gz "https://github.com/ggml-org/llama.cpp/releases/download/${ver}/llama-${ver}-bin-ubuntu-x64.tar.gz"
          mkdir -p llama && tar -xzf llama.tar.gz -C llama
          dst="src-tauri/sidecars/bundled/llama.cpp"
          mkdir -p "$dst"
          srv=$(find llama -name "llama-server" -type f | head -1)
          [ -n "$srv" ] || { echo "llama-server not found in archive"; find llama -maxdepth 3 | head -30; exit 1; }
          cp "$srv" "$dst/"
          find llama -name "*.so*" -exec cp {} "$dst/" \; 2>/dev/null || true
          printf "cpu" > "$dst/variant.txt"
          chmod +x "$dst/llama-server"
          ls -la "$dst"
          test -x "$dst/llama-server"

      # ------------------------------------------------------------------
      # Application build
      # ------------------------------------------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust target (macOS Apple Silicon)
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Build application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Audiobook Generator ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audiobook-generator-${{ matrix.os }}-bundles
          path: |
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/nsis/*-setup.exe
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/macos/*.app.tar.gz
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
            src-tauri/target/**/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Publish release with all artifacts
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -print

      - name: Generate changelog from Conventional Commits
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const workspace = process.env.GITHUB_WORKSPACE || process.cwd();

            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const currentTag = context.ref.replace(/^refs\/tags\//, '');
              console.log(`[changelog] current tag: ${currentTag}`);

              // 1. Find previous stable tag
              const { data: tags } = await github.rest.repos.listTags({
                owner, repo, per_page: 10,
              });
              const stableTags = tags
                .map(t => t.name)
                .filter(n => /^v\d+\.\d+\.\d+$/.test(n))
                .filter(n => n !== currentTag)
                .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));
              const previousTag = stableTags[0] || null;
              console.log(`[changelog] previous tag: ${previousTag || '(none)'}`);

              // 2. Get commits
              let commits = [];
              if (previousTag) {
                const { data } = await github.rest.repos.compareCommits({
                  owner, repo, base: previousTag, head: currentTag,
                });
                commits = data.commits;
              } else {
                const { data } = await github.rest.repos.listCommits({
                  owner, repo, per_page: 50,
                });
                commits = data;
              }
              console.log(`[changelog] commits in range: ${commits.length}`);

              // 3. Categorize by Conventional Commits prefix
              const whatsnew = [];
              const improvements = [];
              const breaking = [];
              for (const c of commits) {
                const msg = c.commit.message.split('\n')[0];
                if (/^[a-zA-Z0-9_-]+!:/.test(msg) || /BREAKING CHANGE:/i.test(c.commit.message)) {
                  breaking.push(msg);
                } else if (/^(feat|fix)(\([^)]+\))?!?:/i.test(msg)) {
                  whatsnew.push(msg);
                } else if (/^(refactor|perf|docs)(\([^)]+\))?!?:/i.test(msg)) {
                  improvements.push(msg);
                }
              }

              // 4. Build body
              const fmt = (arr) => arr.length
                ? arr.map(m => '- ' + m).join('\n')
                : '_No changes in this category — see commits on GitHub._';
              const sections = [
                "## What's new",
                fmt(whatsnew),
                "## Improvements",
                fmt(improvements),
              ];
              if (breaking.length > 0) {
                sections.push("## \u26A0\uFE0F Breaking changes");
                sections.push(fmt(breaking));
              }
              sections.push("## First run");
              sections.push('- Everything needed to run is bundled inside the installer (`llama-server`, `qwen-tts`, `voxcpm2-cli`, `ffmpeg`). No runtime downloads of engine binaries — the app works offline out of the box. Only the TTS model weights (GGUF) are downloaded on demand from the Models panel.');
              sections.push("## Notes");
              sections.push('- **No Python required**: everything runs through native sidecar binaries shipped in the installer.');
              sections.push('- **No code signing**: Audiobook Generator is open source (MIT) but not yet code-signed. You may see a SmartScreen warning on Windows or a Gatekeeper block on macOS.');
              sections.push("## Downloads");
              sections.push('- **Windows:** `.msi` (WiX) and `-setup.exe` (NSIS) installers');
              sections.push('- **macOS:** `.dmg` (Apple Silicon), `.app.tar.gz`');
              sections.push('- **Linux:** `.deb`, `.rpm`, and AppImage');

              const body = sections.join('\n\n');

              // 5. Write body to file
              const bodyPath = path.join(workspace, 'release_body.md');
              fs.writeFileSync(bodyPath, body, 'utf8');
              console.log(`[changelog] wrote body to ${bodyPath} (${body.length} chars)`);
              core.setOutput('body_path', bodyPath);
            } catch (err) {
              console.error(`[changelog] FAILED: ${err.message}`);
              console.error(err.stack);
              core.setFailed(`Generate changelog failed: ${err.message}`);
            }

      - name: Sync release body and tag from changelog file
        id: sync
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
            const bodyPath = path.join(workspace, 'release_body.md');
            const currentTag = context.ref.replace(/^refs\/tags\//, '');

            try {
              if (!fs.existsSync(bodyPath)) {
                console.log(`[sync] no changelog file at ${bodyPath}, skipping`);
                return;
              }
              const body = fs.readFileSync(bodyPath, 'utf8');

              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner, repo: context.repo.repo, per_page: 20,
              });
              const target = releases.find(r =>
                r.tag_name === currentTag || r.target_commitish === context.sha
              );

              if (target) {
                console.log(`[sync] deleting pre-existing release id=${target.id} tag=${target.tag_name} (draft=${target.draft})`);
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner, repo: context.repo.repo, release_id: target.id,
                });
              }

              const { data: created } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: currentTag,
                name: `Audiobook Generator ${currentTag}`,
                body: body,
                draft: true,
                prerelease: false,
                target_commitish: context.sha,
              });
              console.log(`[sync] created release id=${created.id} tag_name=${created.tag_name}`);
            } catch (err) {
              console.error(`[sync] FAILED: ${err.message}`);
              console.error(err.stack);
              core.setFailed(`Sync release body failed: ${err.message}`);
            }

      - name: Create or update release and attach all artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Audiobook Generator ${{ github.ref_name }}"
          draft: true
          prerelease: false
          generate_release_notes: false
          body_path: release_body.md
          files: |
            artifacts/**/*.msi
            artifacts/**/*-setup.exe
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
